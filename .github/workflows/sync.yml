name: Sync Packages

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午8点自动运行
  workflow_dispatch:    # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Sync Sources
        run: |
          # 配置 Git 用户信息
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # 定义同步函数 (仓库链接, 目标文件夹, [子目录路径])
          sync_repo() {
            local url=$1
            local dest=$2
            local subdir=$3
            
            echo "Syncing $dest from $url..."
            rm -rf "$dest"
            
            if [ -z "$subdir" ]; then
              # 全仓库同步 (去 git 信息)
              git clone --depth 1 "$url" "temp_$dest"
              mv "temp_$dest" "$dest"
            else
              # 指定子目录同步 (使用 sparse-checkout)
              mkdir -p "temp_$dest"
              cd "temp_$dest"
              git init
              git remote add origin "$url"
              git config core.sparseCheckout true
              echo "$subdir" >> .git/info/sparse-checkout
              git pull --depth 1 origin master || git pull --depth 1 origin main
              cd ..
              mv "temp_$dest/$subdir" "$dest"
            fi
            rm -rf "temp_$dest"
            rm -rf "$dest/.git" # 移除 Git 追踪信息，使其变为普通文件夹
          }

          # 执行同步任务
          sync_repo "https://github.com/gaoderby/luci-app-kms" "luci-app-kms"
          sync_repo "https://github.com/vernesong/OpenClash" "luci-app-openclash" "luci-app-openclash"
          sync_repo "https://github.com/siwind/luci-app-wolplus" "luci-app-wolplus" "luci-app-wolplus"
          sync_repo "https://github.com/jerrykuku/luci-theme-argon" "luci-theme-argon"
          sync_repo "https://github.com/sbwml/luci-app-mosdns" "luci-app-mosdns"

      - name: Commit and Push
        run: |
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
